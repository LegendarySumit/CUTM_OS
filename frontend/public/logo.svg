<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="#f0f4f8" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Decorative border circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  
  <!-- Crown/header decoration -->
  <g fill="#d4a574">
    <polygon points="80,50 90,35 100,40 110,35 120,50"/>
  </g>
  
  <!-- Car icon -->
  <g fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body -->
    <path d="M 55 110 L 65 80 L 135 80 L 145 110 Z"/>
    <!-- Car roof -->
    <path d="M 75 80 L 85 65 L 115 65 L 125 80"/>
    <!-- Windows -->
    <rect x="75" y="68" width="15" height="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="110" y="68" width="15" height="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="75" cy="115" r="7" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="125" cy="115" r="7" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Wheel hubs -->
    <circle cx="75" cy="115" r="3" fill="#1e3a8a"/>
    <circle cx="125" cy="115" r="3" fill="#1e3a8a"/>
  </g>
  
  <!-- Text: CUTM OS -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">CUTM OS</text>
</svg>